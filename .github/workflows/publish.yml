name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, for example v0.3.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npm run release:check -- "$RELEASE_TAG"
        env:
          RELEASE_TAG: ${{ inputs.tag }}
      - run: npm run check
      - run: npm run smoke:pack
      - run: npm run smoke:plugin
      - run: npm publish --access public
      - run: npm run release:readback
